<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>01 — HTML & CSS Basics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav class="nav-bar">
        <a href="/">Home</a>
        <a href="/about">About</a>
      </nav>
    </header>

    <main>
      <h1>Hello, Frontend!</h1>
      <p>This is a paragraph. It contains <a href="https://developer.mozilla.org">a link</a> and some <span>inline text</span>.</p>

      <section class="section">
        <h2>A List Example</h2>
        <ul>
          <li>Item one</li>
          <li>Item two</li>
          <li>Item three</li>
        </ul>
      </section>

      <section class="section">
        <h2>A Form Example</h2>
        <form>
          <div class="form-group">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" placeholder="Your name" />
          </div>

          <div class="form-group">
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" placeholder="you@example.com" />
          </div>

          <button type="submit">Submit</button>
        </form>
      </section>
    </main>

    <footer class="footer">
      <p>Learning frontend — Topic 01</p>
    </footer>
  </body>
</html>
